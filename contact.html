<!DOCTYPE html>

<body>

    <div class="container">

        <div class="section-one">
            <h1 class="section-one__title">Vignesh Kumar</h1>
            <p class="section-one__role">Web Developer</p>
            <a class="section-one__contact" href="index.html">Home</a>
        </div>
      

        <div class="contact-form">
            <form>
                <table>
                    <tr>
                        <td>Name:</td>
                        <td><input type="text" placeholder="Enter Your Name" class="inputbox"></td>
                    </tr>
        
                    <tr>
                        <td>Email:</td>
                        <td><input type="text" placeholder="Enter Your Email" class="inputbox"></td>
                    </tr>
        
                    <tr>
                        <td>Message:</td>
                        <td><textarea name="message" id="message" placeholder="Enter Your Message" class="textarea"></textarea></td>
                    </tr>
        
                    <tr>
                        <td></td>
                        <td><input type="submit" class="submit"></td>
                    </tr>
                </table>
            </form> 
        </div>
        
    
        <div class="section-five">
            <p class="section-five__title">Social Media:<a href="https://www.instagram.com/">Instagram</a>.<a
                href="https://www.google.com/search?q=linkedin&rlz=1C1ONGR_enIN1098IN1098&oq=linkedin&gs_lcrp=EgZjaHJvbWUqBggAEEUYOzIGCAAQRRg7MgYIARBFGDzSAQgyNTU0ajBqNKgCALACAA&sourceid=chrome&ie=UTF-8">LinkedIn</a>
        </p>
    
        <p class="section-five__desc">&copy;Vignesh Kumar</p>
    
        </div>
